; Copia questo file in config.ini e compila i valori.
; config.ini NON va committato (contiene credenziali).

[telegram]
; API ID e API hash ottenibili su https://my.telegram.org
YOUR_API_ID = 123456
YOUR_API_HASH = abcdef0123456789abcdef0123456789
; Nome della sessione Telethon (verra' creato <SESSION_NAME>.session)
SESSION_NAME = crawler_session
; Username (@canale) o ID del canale da monitorare
CHANNEL_ENTITY = @nome_canale

[mt5]
; Percorso di terminal64.exe di MetaTrader 5. Vuoto = terminale di default.
; Il terminale deve essere in esecuzione e loggato su un conto HEDGING.
TERMINAL_PATH =
; Suffisso dei simboli del broker (es. .m per EURUSD.m). Vuoto se non usato.
SYMBOL_SUFFIX =
; Slippage massimo in punti per gli ordini a mercato (30 = 3 pip a 5 cifre).
DEVIATION_POINTS = 30

[risk]
; FIXED = lotto fisso | RISK_PERCENT = rischio % per trade | BALANCE = scalini sul balance
MODE = BALANCE
; Lotto usato in modalita' FIXED e come fallback negli altri casi limite
FIXED_LOT = 0.01
; Percentuale di equity da rischiare per trade in modalita' RISK_PERCENT
RISK_PERCENT = 1.0
; --- Parametri MODE=BALANCE ---
; Deposito iniziale del conto. Vuoto = rilevato dal balance al primo avvio
; e salvato nello stato (non cambia ai riavvii).
INITIAL_DEPOSIT =
; Percentuale del deposito iniziale considerata capitale disponibile:
; disponibile = balance - (100 - AVAILABLE_PERCENT)% del deposito
AVAILABLE_PERCENT = 10
; LOT_PER_STEP lotti ogni BALANCE_STEP (valuta del conto) di capitale disponibile
BALANCE_STEP = 1000
LOT_PER_STEP = 0.01

[guard]
; Guardia delle posizioni in perdita: taglio e riapertura immediata con
; stessi SL/TP, perdita cumulata nel commento ("@1.3390 (-120)").
ENABLED = true
; Perdita di prezzo (valuta del conto, esclusi swap/commissioni) oltre la
; quale la posizione viene tagliata e riaperta
CUT_LOSS = 125
; Ogni quanti secondi controllare le posizioni aperte
INTERVAL_SECONDS = 15
; --- Anti-churn (protezioni contro il ciclo taglio/riapertura) ---
; Eta' minima in secondi prima che una posizione sia tagliabile (0 = off):
; una posizione appena aperta parte gia' in perdita dello spread, e ogni
; riaperta e' una posizione nuova (fa anche da pausa tra un taglio e l'altro)
MIN_AGE_SECONDS = 60
; Taglio rinviato finche' CUT_LOSS non supera SPREAD_FACTOR volte il costo
; dello spread corrente (0 = off): evita di tagliare con spread da notizie
SPREAD_FACTOR = 2
; --- Blackout notizie ad alto impatto (calendario gratuito Forex Factory) ---
; Sospende TUTTI i tagli per +/- NEWS_BLACKOUT_MINUTES attorno a qualunque
; notizia "High". Solo la guardia: i segnali del canale vengono sempre eseguiti.
NEWS_BLACKOUT = true
NEWS_BLACKOUT_MINUTES = 30
